<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OdontoSoft — Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #004d40 0%, #00796b 50%, #26a69a 100%);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .login-card {
      background: #fff; border-radius: 20px; overflow: hidden;
      width: 100%; max-width: 420px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.5s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-header {
      background: linear-gradient(135deg, #00695c, #00897b);
      padding: 40px 32px 32px; text-align: center;
    }
    .logo-circle {
      width: 72px; height: 72px; background: rgba(255,255,255,0.2);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 16px;
      border: 2px solid rgba(255,255,255,0.4);
    }
    .logo-circle i { font-size: 36px; color: #fff; }
    .card-header h1 { color:#fff; font-size:1.8rem; font-weight:800; margin-bottom:4px; }
    .card-header p  { color:rgba(255,255,255,0.8); font-size:0.85rem; }
    .card-body { padding: 36px 32px 32px; }
    .field-group { margin-bottom: 20px; }
    .field-group label {
      display: block; font-size: 0.78rem; font-weight: 700;
      color: #546e7a; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px;
    }
    .input-wrapper { position: relative; display: flex; align-items: center; }
    .input-wrapper i { position: absolute; left: 14px; color: #90a4ae; font-size: 20px; pointer-events: none; }
    .input-wrapper input {
      width: 100%; height: 48px; border: 2px solid #e0e0e0; border-radius: 10px;
      padding: 0 16px 0 44px; font-family: 'Nunito', sans-serif; font-size: 0.95rem;
      color: #263238; outline: none; background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper input:focus {
      border-color: #00897b; box-shadow: 0 0 0 3px rgba(0,137,123,0.15); background: #fff;
    }
    .error-box {
      background: #ffebee; border: 1px solid #ef9a9a; border-radius: 8px;
      padding: 10px 14px; color: #c62828; font-size: 0.85rem; font-weight: 600;
      display: none; margin-bottom: 16px; align-items: center; gap: 8px;
    }
    .btn-login {
      width: 100%; height: 50px;
      background: linear-gradient(135deg, #00695c, #00897b);
      color: #fff; border: none; border-radius: 10px;
      font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 8px; transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .btn-login:hover  { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,105,92,0.4); }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .spinner {
      width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer-text { text-align: center; color: #90a4ae; font-size: 0.78rem; margin-top: 24px; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="card-header">
    <div class="logo-circle"><i class="material-icons">local_hospital</i></div>
    <h1>OdontoSoft</h1>
    <p>Sistema de Gestión Odontológica</p>
  </div>
  <div class="card-body">
    <div class="field-group">
      <label>Correo electrónico</label>
      <div class="input-wrapper">
        <i class="material-icons">email</i>
        <input id="email" type="email" placeholder="correo@ejemplo.com" autocomplete="email"/>
      </div>
    </div>
    <div class="field-group">
      <label>Contraseña</label>
      <div class="input-wrapper">
        <i class="material-icons">lock</i>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
    </div>
    <div class="error-box" id="error-box">
      <i class="material-icons">error_outline</i>
      <span id="error-text"></span>
    </div>
    <button class="btn-login" id="btn-login" onclick="iniciarSesion()">
      <i class="material-icons">login</i> Ingresar
    </button>
    <p class="footer-text">© 2025 OdontoSoft · Todos los derechos reservados</p>
  </div>
</div>
<script src="js/config.js"></script>
<script>
  // Si ya hay sesión activa, redirigir
  if (getToken()) window.location.href = 'pages/pacientes.html';

  document.addEventListener('keydown', (e) => { if (e.key === 'Enter') iniciarSesion(); });

  async function iniciarSesion() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btn-login');

    if (!email || !password) { mostrarError('Por favor completa todos los campos.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Ingresando...';
    document.getElementById('error-box').style.display = 'none';

    const data = await fetchAPI('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password }),
    });

    if (data.success) {
      localStorage.setItem('os_token',   data.token);
      localStorage.setItem('os_usuario', JSON.stringify(data.data.usuario));
      window.location.href = 'pages/pacientes.html';
    } else {
      mostrarError(data.mensaje || 'Error al iniciar sesión.');
      btn.disabled = false;
      btn.innerHTML = '<i class="material-icons">login</i> Ingresar';
    }
  }

  function mostrarError(msg) {
    const box = document.getElementById('error-box');
    document.getElementById('error-text').textContent = msg;
    box.style.display = 'flex';
  }
</script>
</body>
</html>
