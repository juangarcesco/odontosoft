version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: odontosoft-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: odontosoft
    volumes:
      - mongodb_data:/data/db
    networks:
      - odontosoft-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: odontosoft-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongodb:27017/odontosoft
      JWT_SECRET: ${JWT_SECRET:?Variable JWT_SECRET es requerida}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:80}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - odontosoft-network

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: odontosoft-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - odontosoft-network

volumes:
  mongodb_data:
    name: odontosoft_mongodb_data

networks:
  odontosoft-network:
    name: odontosoft_network
    driver: bridge
